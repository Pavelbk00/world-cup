server {
    listen 80;
    server_name lions-cup31.ru www.lions-cup31.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    # Включаем http2 по новому стандарту (поддерживается и на Ubuntu 22, и на 24)
    http2 on; 
    
    server_name lions-cup31.ru www.lions-cup31.ru;

    ssl_certificate /etc/letsencrypt/live/lions-cup31.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lions-cup31.ru/privkey.pem;

    root /var/www/world-cup/dist;
    index index.html;

    # Gzip сжатие статики
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;

    # API proxy to Express backend
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Ваши увеличенные таймауты для защиты от 504 ошибки на бэкенде
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # Static files (Кэширование картинок, шрифтов и скриптов Vite)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — здесь только раздача index.html без прокси-таймаутов
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Запрет доступа к скрытым файлам (например, .git)
    location ~ /\. {
        deny all;
    }
}
