server {
    listen 80;
    server_name lions-cup31.ru www.lions-cup31.ru;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name lions-cup31.ru www.lions-cup31.ru;

    ssl_certificate /etc/letsencrypt/live/lions-cup31.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lions-cup31.ru/privkey.pem;

    root /var/www/world-cup/dist;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;

    # API proxy to Express backend
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 30s;
    }

    # Static files
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — все маршруты отдаём index.html
    location / {
        try_files $uri $uri/ /index.html;

        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # Запрет доступа к скрытым файлам
    location ~ /\. {
        deny all;
    }
}